<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTU DIGTAL STOR.HOME</title>
    <link rel="icon" href="https://ibb.co/VY3YWgKy">

    <link rel="stylesheet" href="Home.css">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C3SHSN5TDX"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-C3SHSN5TDX');
    </script>
    <!-- End Google Analytics -->

</head>

<body>

<header>

    <div class="logo-box">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGQQDv_plCTNduaQnsV1TlgFWIGIm0i4mo1QjyhseiFQ&s"
             class="logo-img" alt="TTU Store Logo">

        <div class="logo">TTU STORE</div>
    </div>

</header>

<!-- السيرش -->
<div class="search-wrapper">

    <div class="search-box">
      <div class="categories">

    <div class="category">
        🎮 بطاقات
    </div>

    <div class="category">
        📺 اشتراكات
    </div>

    <div class="category">
        👤 حسابات
    </div>

</div>
        <input type="text" id="searchInput" placeholder="ابحث عن منتج...">
    </div>

    <div id="suggestions" class="suggestions-box"></div>

</div>

<!-- البانر -->
<div class="banner-slider">
  
    <img id="bannerImage" src="" alt="Banner Image">

</div>

<!-- المنتجات -->
<section class="products-container" id="productsContainer"></section>

<!-- Modal للشراء -->
<div id="buyModal" class="buy-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2>تأكيد الشراء</h2>
      <button class="close-btn" onclick="closeBuyModal()">&times;</button>
    </div>
    
    <div style="margin-bottom: 1.5rem;">
      <p style="margin-bottom: 1rem;"><strong>المنتج:</strong> <span id="productTitle"></span></p>
      <p style="margin-bottom: 1rem;"><strong>السعر:</strong> <span id="productPrice"></span></p>
      <p style="color: #888; font-size: 0.9rem;">يرجى ملء النموذج أدناه لإتمام عملية الشراء</p>
    </div>

    <div class="modal-buttons">
      <a id="buyFormLink" class="modal-btn" href="" target="_blank">
        ✓ اكمل عملية الشراء
      </a>
      <button class="modal-btn" style="background: #444;" onclick="closeBuyModal()">
        ✕ إلغاء
      </button>
    </div>
  </div>
</div>

<!-- نموذج جوجل الإضافي -->
<div style="display: none;">
  <!-- نموذج طلب منتج غير موجود -->
  <a id="customProductForm" href="https://forms.gle/your-custom-product-form" target="_blank"></a>
</div>

<script src="Home.js"></script>

</body>
</html>
