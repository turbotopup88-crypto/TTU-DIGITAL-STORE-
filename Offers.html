<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الخصومات</title>

<meta property="og:type" content="website">
<meta property="og:title" content="المتجر - الخصومات">
<meta property="og:description" content="أقوى خصومات المنتجات الرقمية - تسليم فوري عبر واتساب">
<meta property="og:image" content="https://via.placeholder.com/1200x630/0a0714/e3120b?text=Offers">
<meta name="twitter:card" content="summary_large_image">

<script src="lang.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-icons start">
      <button class="icon-btn" id="menu-btn" aria-label="القائمة">☰</button>
    </div>
    <img class="logo" src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGQQDv_plCTNduaQnsV1TlgFWIGIm0i4mo1QjyhseiFQ&s" alt="شعار المتجر">
    <div class="header-icons end">
      <button class="icon-btn" id="cart-btn" aria-label="السلة">
        🛒
        <span class="cart-badge" id="cart-count" style="display:none">0</span>
      </button>
    </div>
  </header>

  <div class="search-bar" id="search-bar">
    <div class="search-wrap">
      <input type="text" id="search-input" placeholder="ابحث في العروض..." data-i18n-placeholder="searchPlaceholder" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
      <button type="button" class="search-submit-btn" id="search-submit" aria-label="بحث">🔍</button>
      <div class="search-suggestions" id="search-suggestions" style="display:none"></div>
    </div>
  </div>

  <!-- بانر الخصومات: صورة عربي أو إنجليزي حسب اللغة الحالية، ورابط واحد لو موجود -->
  <div style="padding:14px 16px 0;">
    <a id="offers-banner-link" href="#">
      <img id="offers-banner-img" src="" alt="" style="width:100%; border-radius:var(--radius); display:block;">
    </a>
  </div>

  <div style="padding:18px 16px 0;">
    <a class="back-link" href="index.html" id="back-link">→ العودة للمتجر</a>
  </div>

  <h2 class="section-title" data-i18n="offersTitle">الخصومات</h2>

  <div class="product-grid" id="product-grid" style="margin-top:8px;">
    <!-- المنتجات اللي عندها oldPrice بتظهر هنا تلقائياً -->
  </div>
  <div id="grid-sentinel" class="grid-sentinel"></div>

  <footer class="site-footer">
    <div class="footer-links">
      <a href="privacy.html" data-i18n="footerPrivacy">سياسة الخصوصية</a>
      <a href="returns.html" data-i18n="footerReturns">سياسة الاستبدال والاسترجاع</a>
    </div>
    <p class="footer-copy" data-i18n="footerCopy">© 2026 جميع الحقوق محفوظة</p>
  </footer>

  <!-- ---------- Nav Drawer (القائمة) ---------- -->
  <div class="nav-overlay" id="nav-overlay"></div>
  <aside class="nav-drawer" id="nav-drawer" aria-label="القائمة">
    <div class="nav-header">
      <h2 data-i18n="menuLabel">القائمة</h2>
      <button class="nav-close" id="nav-close" aria-label="إغلاق القائمة">✕</button>
    </div>
    <div class="nav-body">
      <a class="nav-link" href="index.html" data-i18n="homeLink">الرئيسية</a>
      <a class="nav-link" href="offers.html" data-i18n="offersLink">الخصومات</a>
      <div class="nav-section-label" data-i18n="categoriesTitle">تصفح حسب الفئة</div>
      <div id="nav-categories"></div>
      <div class="nav-divider"></div>
      <div class="nav-lang-row">
        <span data-i18n="menuLabel">اللغة</span>
        <button class="icon-btn" id="lang-toggle" aria-label="تغيير اللغة">
          🌐
          <span class="lang-badge" id="lang-badge">EN</span>
        </button>
      </div>
      <div class="nav-divider"></div>
      <a class="nav-link" href="privacy.html" data-i18n="footerPrivacy">سياسة الخصوصية</a>
      <a class="nav-link" href="returns.html" data-i18n="footerReturns">سياسة الاستبدال والاسترجاع</a>
    </div>
  </aside>

  <!-- ---------- Cart Drawer ---------- -->
  <div class="cart-overlay" id="cart-overlay"></div>
  <aside class="cart-drawer" id="cart-drawer" aria-label="سلة المشتريات">
    <div class="cart-header">
      <h2 data-i18n="cartTitle">سلتك</h2>
      <button class="cart-close" id="cart-close" aria-label="إغلاق السلة">✕</button>
    </div>
    <div class="cart-body" id="cart-body"></div>
    <div class="cart-footer" id="cart-footer">
      <button type="button" class="cart-fields-toggle" id="cart-fields-toggle">
        <span data-i18n="customerInfoLabel">بيانات التواصل وطريقة الدفع</span>
        <span class="toggle-arrow">▾</span>
      </button>
      <div class="cart-checkout-fields" id="cart-checkout-fields">
        <div class="field">
          <label for="cart-name" data-i18n="nameLabel">الاسم الكامل</label>
          <input type="text" id="cart-name" placeholder="اكتب اسمك" data-i18n-placeholder="namePlaceholder">
        </div>
        <div class="field">
          <label for="cart-phone" data-i18n="phoneLabel">رقم الهاتف</label>
          <input type="tel" id="cart-phone" placeholder="09xxxxxxxx">
        </div>
        <div class="field">
          <label for="cart-email" data-i18n="emailLabel">البريد الإلكتروني (اختياري)</label>
          <input type="email" id="cart-email" placeholder="example@email.com" data-i18n-placeholder="emailPlaceholder">
        </div>
        <div class="field">
          <label for="cart-payment" data-i18n="paymentLabel">طريقة الدفع</label>
          <select id="cart-payment">
            <option value="" disabled selected data-i18n="paymentChoose">اختر طريقة الدفع</option>
            <option value="bank" data-i18n="paymentBank">تحويل مصرفي</option>
            <option value="wallet" data-i18n="paymentWallet">محفظة إلكترونية</option>
            <option value="cash" data-i18n="paymentCash">نقداً عند الاستلام</option>
          </select>
        </div>
      </div>

      <p class="form-error" id="cart-form-error" data-i18n="orderErrorMsg">من فضلك عبئ الاسم، الهاتف وطريقة الدفع.</p>

      <div class="cart-total-row">
        <span data-i18n="total">الإجمالي</span>
        <span id="cart-total">0</span>
      </div>
      <button class="whatsapp-btn" id="cart-checkout" data-i18n="checkout">🟢 إتمام الطلب عبر واتساب</button>
    </div>
  </aside>

  <script src="products.js"></script>
  <script src="cart.js"></script>
  <script src="catalog.js"></script>
  <script>
    setupNavDrawer();

    document.getElementById('back-link').textContent = t('backLink');

    // ---------- بانر الخصومات (يبدّل الصورة حسب اللغة الحالية) ----------
    const bannerImg = document.getElementById('offers-banner-img');
    const bannerLink = document.getElementById('offers-banner-link');
    bannerImg.src = getLang() === 'en' ? OFFERS_BANNER.imageEn : OFFERS_BANNER.imageAr;
    bannerImg.alt = t('offersTitle');
    if (OFFERS_BANNER.link) {
      bannerLink.href = OFFERS_BANNER.link;
    } else {
      bannerLink.removeAttribute('href');
      bannerLink.style.pointerEvents = 'none';
    }

    // ---------- منتجات فيها خصم (oldPrice) تلقائياً، من غير ما تتكرر يدوياً ----------
    const gridEl = document.getElementById('product-grid');
    const sentinelEl = document.getElementById('grid-sentinel');

    const offerEntries = shuffleArray(
      Object.entries(PRODUCTS).filter(([, p]) => p.oldPrice && p.oldPrice > p.price)
    );

    const productGrid = createInfiniteGrid({
      gridEl: gridEl,
      sentinelEl: sentinelEl,
      items: offerEntries,
      pageSize: 22,
      emptyMessage: t('offersEmpty')
    });

    function renderProducts(filter = "") {
      const term = filter.trim().toLowerCase();
      const filtered = !term
        ? offerEntries
        : offerEntries.filter(([, p]) => p.name.toLowerCase().includes(term) || p.platformTag.toLowerCase().includes(term));
      productGrid.reset(filtered);
    }

    // ---------- البحث (داخل صفحة الخصومات فقط) ----------
    const searchInput = document.getElementById('search-input');
    const searchSubmit = document.getElementById('search-submit');
    const suggestBox = document.getElementById('search-suggestions');
    const MAX_SUGGESTIONS = 5;
    let activeSuggestion = -1;

    searchSubmit.addEventListener('click', () => {
      searchInput.focus();
      gridEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });

    function highlight(text, term) {
      if (!term) return text;
      const i = text.toLowerCase().indexOf(term.toLowerCase());
      if (i === -1) return text;
      return `${text.slice(0, i)}<mark>${text.slice(i, i + term.length)}</mark>${text.slice(i + term.length)}`;
    }

    function matchingProducts(term) {
      const q = term.trim().toLowerCase();
      if (!q) return [];
      return offerEntries.filter(([, p]) =>
        p.name.toLowerCase().includes(q) || p.platformTag.toLowerCase().includes(q)
      );
    }

    function renderSuggestions(term) {
      const matches = matchingProducts(term);
      activeSuggestion = -1;

      if (!term.trim()) {
        closeSuggestions();
        return;
      }

      if (matches.length === 0) {
        suggestBox.innerHTML = `<p class="suggestion-empty">${t('noResultsFor')(term)}</p>`;
        suggestBox.style.display = 'block';
        searchInput.setAttribute('aria-expanded', 'true');
        return;
      }

      const shown = matches.slice(0, MAX_SUGGESTIONS);
      suggestBox.innerHTML = shown
        .map(([id, p]) => `
          <a class="suggestion-item" href="product.html?id=${id}" data-id="${id}">
            <img src="${p.image}" alt="">
            <div class="suggestion-info">
              <span class="s-name">${highlight(localized(p.name, p.nameEn), term)}</span>
              <span class="s-price">${p.price} ${currencyText(p)}</span>
            </div>
          </a>
        `)
        .join('');

      if (matches.length > MAX_SUGGESTIONS) {
        const more = document.createElement('button');
        more.type = 'button';
        more.className = 'suggestion-more';
        more.textContent = t('showAllResults')(matches.length);
        more.addEventListener('click', () => {
          renderProducts(term);
          closeSuggestions();
          gridEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        suggestBox.appendChild(more);
      }

      suggestBox.style.display = 'block';
      searchInput.setAttribute('aria-expanded', 'true');
    }

    function closeSuggestions() {
      suggestBox.style.display = 'none';
      suggestBox.innerHTML = '';
      searchInput.setAttribute('aria-expanded', 'false');
      activeSuggestion = -1;
    }

    searchInput.addEventListener('input', () => {
      renderProducts(searchInput.value);
      renderSuggestions(searchInput.value);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeSuggestions();
        return;
      }

      const items = [...suggestBox.querySelectorAll('.suggestion-item')];
      if (items.length === 0) return;

      if (e.key === 'ArrowDown') {
        e.preventDefault();
        activeSuggestion = (activeSuggestion + 1) % items.length;
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        activeSuggestion = (activeSuggestion - 1 + items.length) % items.length;
      } else if (e.key === 'Enter' && activeSuggestion > -1) {
        e.preventDefault();
        window.location.href = items[activeSuggestion].href;
        return;
      } else {
        return;
      }

      items.forEach((el, i) => el.classList.toggle('active', i === activeSuggestion));
      items[activeSuggestion].scrollIntoView({ block: 'nearest' });
    });

    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) closeSuggestions();
    });
  </script>
</body>
</html>
