<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TTU DIGITAL STORE | Batman Arkham Knight Xbox</title>
    <link rel="icon" href="https://i.ibb.co/CKWK5brd/48929.png">
    <link rel="stylesheet" href="all_products(1).css">
</head>

<body>

<header>
    <div class="logo-box">
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQGQQDv_plCTNduaQnsV1TlgFWIGIm0i4mo1QjyhseiFQ&s" class="logo-img">
        <div class="logo">TTU STORE</div>
    </div>
</header>

<a href="index.html" class="back-btn">← العودة</a>

<section class="product-page">
    <!-- قسم الصور -->
    <div class="product-images">
        <div class="image-wrapper">
            <img class="main-image" id="mainImage" src="https://i.ibb.co/gLBtLMZ6/d550f93b3de7b68015516483344066ec.jpg">
            <div class="views-badge">
                👁 <span id="viewsCount">0</span>
            </div>
        </div>
        <div class="small-images">
            <img src="https://i.ibb.co/Cshn8N6m/1397703-1.jpg" class="thumb-img active-thumb">
            <img src="https://i.ibb.co/JwRRMXFV/1397706-1.jpg" class="thumb-img">
            <img src="https://i.ibb.co/0jQ6NMGY/593545-1.jpg" class="thumb-img">
        </div>
    </div>

    <!-- قسم معلومات المنتج -->
    <div class="product-info-details">
        <h1 class="product-title">Batman Arkham Knight  Xbox</h1>
        
        <div class="product-price-section">
            <div class="product-price">270 جنيه</div>
            <div class="product-badge">🔥 حساب كامل</div>
        </div>

        <div class="product-rating-section">
            <div class="stars-display" id="starsDisplay">★★★★★</div>
            <div class="rating-text" id="ratingText">4.6 · 22 تقييماً</div>
        </div>

        <!-- إطار واضح لوصف المنتج -->
        <div class="description-box">
            <h3>📋 وصف المنتج</h3>
            <p>لعبة-Batman Arkham Knight-حساب كامل-يعمل على اجهزة: Xbox one | Xbox Series S|X </p>
        </div>

        <!-- الأزرار (فوق بعض) -->
        <div class="action-buttons-vertical">
            <button class="add-to-cart-btn-product" id="addToCartBtn">
                🛒 أضف إلى السلة
            </button>
            <button class="buy-now-btn-product" id="buyNowBtn">
                💳 شراء الآن
            </button>
        </div>
    </div>
</section>

<script>
// ======================
// بيانات المنتج
// ======================
const productData = {
    id: "Product-TTU_Batman_arkham_knight_Xbox",
    title: "Batman Arkham Knight Xbox",
    price: 270,
    priceText: "270 جنيه",
    image: "https://i.ibb.co/gLBtLMZ6/d550f93b3de7b68015516483344066ec.jpg",
    rating: 4.9,
    ratingCount: 25
};

// ======================
// نظام السلايدر
// ======================
const thumbImages = document.querySelectorAll('.thumb-img');
const mainImage = document.getElementById('mainImage');
let currentImageIndex = 0;

function changeMainImage(index) {
    mainImage.src = thumbImages[index].src;
    thumbImages.forEach((thumb, i) => {
        if (i === index) {
            thumb.classList.add('active-thumb');
        } else {
            thumb.classList.remove('active-thumb');
        }
    });
    currentImageIndex = index;
}

thumbImages.forEach((thumb, index) => {
    thumb.addEventListener('click', () => changeMainImage(index));
});

let autoSlideInterval = setInterval(() => {
    let nextIndex = (currentImageIndex + 1) % thumbImages.length;
    changeMainImage(nextIndex);
}, 4000);

const imagesContainer = document.querySelector('.product-images');
imagesContainer.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
imagesContainer.addEventListener('mouseleave', () => {
    autoSlideInterval = setInterval(() => {
        let nextIndex = (currentImageIndex + 1) % thumbImages.length;
        changeMainImage(nextIndex);
    }, 4000);
});

// ======================
// نظام المشاهدات
// ======================
const productViewsKey = "view_Batman_arkham_knight_xbox";
let views = localStorage.getItem(productViewsKey);
if (!views) views = 0;
views++;
localStorage.setItem(productViewsKey, views);
document.getElementById('viewsCount').innerText = views;

// ======================
// عرض التقييم بالنجوم
// ======================
function displayStars(rating) {
    let fullStars = Math.floor(rating);
    let halfStar = (rating % 1) >= 0.5;
    let emptyStars = 5 - fullStars - (halfStar ? 1 : 0);
    let stars = '★'.repeat(fullStars);
    if (halfStar) stars += '½';
    stars += '☆'.repeat(emptyStars);
    return stars;
}

document.getElementById('starsDisplay').innerHTML = displayStars(productData.rating);
document.getElementById('ratingText').innerHTML = `${productData.rating} · ${productData.ratingCount} تقييماً`;

// ======================
// نظام السلة (وظائف مشتركة)
// ======================
function getCart() {
    return JSON.parse(localStorage.getItem('cart')) || [];
}

function saveCart(cart) {
    localStorage.setItem('cart', JSON.stringify(cart));
}

function updateCartCountDisplay() {
    const cart = getCart();
    const count = cart.reduce((sum, item) => sum + item.quantity, 0);
    const cartCountSpan = document.getElementById('cartCount');
    if (cartCountSpan) cartCountSpan.textContent = count;
}

function showNotification(msg) {
    const notif = document.createElement('div');
    notif.textContent = msg;
    notif.style.cssText = `
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        background: red; color: white; padding: 12px 24px; border-radius: 10px;
        z-index: 10000; font-size: 14px; animation: fadeOut 2s forwards;
        font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
    `;
    document.body.appendChild(notif);
    setTimeout(() => notif.remove(), 2000);
}

function addToCart(product) {
    let cart = getCart();
    const existingItem = cart.find(item => item.id === product.id);
    if (existingItem) {
        existingItem.quantity++;
    } else {
        cart.push({ ...product, quantity: 1 });
    }
    saveCart(cart);
    updateCartCountDisplay();
    showNotification('✅ تم إضافة المنتج إلى السلة');
}

// ======================
// نافذة الدفع المنبثقة (نسخة من Home.js)
// ======================
function showCheckoutPopup() {
    const cart = getCart();
    
    if (cart.length === 0) {
        showNotification('⚠️ السلة فارغة، أضف منتجات أولاً');
        return;
    }
    
    const modal = document.createElement('div');
    modal.id = 'checkoutModal';
    modal.style.cssText = `
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.95); z-index: 10000;
        display: flex; align-items: center; justify-content: center;
    `;
    
    const totalPrice = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const productList = cart.map(item => `- ${item.title} (${item.quantity}x) = ${item.price * item.quantity} جنيه`).join('\n');
    
    modal.innerHTML = `
        <div style="background:#1b1b1b; padding:25px; border-radius:20px; width:90%; max-width:500px; max-height:90%; overflow-y:auto; border:1px solid red;">
            <h2 style="color:red; margin-bottom:20px;">🛒 إتمام الطلب</h2>
            <div style="background:#111; padding:15px; border-radius:12px; margin-bottom:20px;">
                <h3 style="color:red; margin-bottom:10px;">المنتجات:</h3>
                <pre style="color:white; font-size:13px; white-space:pre-wrap; font-family:Tahoma;">${productList}</pre>
                <h3 style="color:red; margin-top:15px;">الإجمالي: ${totalPrice} جنيه</h3>
            </div>
            <input type="text" id="checkoutName" placeholder="الاسم كاملاً" style="width:100%; padding:12px; margin-bottom:12px; background:#111; border:1px solid #333; border-radius:10px; color:white;">
            <input type="tel" id="checkoutPhone" placeholder="رقم التواصل" style="width:100%; padding:12px; margin-bottom:12px; background:#111; border:1px solid #333; border-radius:10px; color:white;">
            <input type="email" id="checkoutEmail" placeholder="البريد الإلكتروني" style="width:100%; padding:12px; margin-bottom:12px; background:#111; border:1px solid #333; border-radius:10px; color:white;">
            <select id="checkoutPayment" style="width:100%; padding:12px; margin-bottom:20px; background:#111; border:1px solid #333; border-radius:10px; color:white;">
                <option value="vodafone_cash">محفظة فودافون كاش</option>
                <option value="instapay">إنستاباي</option>
                <option value="orange_money">أورانج موني</option>
            </select>
            <button id="confirmOrderBtn" style="background:red; color:white; border:none; padding:14px; border-radius:12px; cursor:pointer; width:100%; font-weight:bold;">📦 إتمام الطلب عبر واتساب</button>
            <button id="closeModalBtn" style="background:#333; color:white; border:none; padding:12px; border-radius:12px; cursor:pointer; width:100%; margin-top:10px;">إغلاق</button>
        </div>
    `;
    
    document.body.appendChild(modal);
    
    document.getElementById('confirmOrderBtn').onclick = () => {
        const name = document.getElementById('checkoutName').value.trim();
        const phone = document.getElementById('checkoutPhone').value.trim();
        const email = document.getElementById('checkoutEmail').value.trim();
        const payment = document.getElementById('checkoutPayment').value;
        
        let paymentText = payment === 'vodafone_cash' ? 'فودافون كاش' : (payment === 'instapay' ? 'إنستاباي' : 'أورانج موني');
        
        if (!name || !phone || !email) {
            showNotification('❌ الرجاء إدخال جميع البيانات');
            return;
        }
        
        const message = `🛒 طلب شراء جديد:\n\n👤 الاسم: ${name}\n📞 رقم التواصل: ${phone}\n📧 البريد: ${email}\n💳 طريقة الدفع: ${paymentText}\n\n📦 المنتجات:\n${productList}\n\n💰 الإجمالي: ${totalPrice} جنيه`;
        
        window.open(`https://wa.me/201555293810?text=${encodeURIComponent(message)}`, '_blank');
        
        // تفريغ السلة بعد إتمام الطلب
        localStorage.setItem('cart', JSON.stringify([]));
        updateCartCountDisplay();
        modal.remove();
        showNotification('✅ تم إرسال طلبك بنجاح');
    };
    
    document.getElementById('closeModalBtn').onclick = () => modal.remove();
}

// ======================
// شراء الآن (يفتح نافذة الدفع مباشرة)
// ======================
function buyNow() {
    // نضيف المنتج الحالي فقط إلى سلة مؤقتة
    let tempCart = [{
        id: productData.id,
        title: productData.title,
        price: productData.price,
        priceText: productData.priceText,
        image: productData.image,
        quantity: 1
    }];
    
    // حفظ السلة المؤقتة
    localStorage.setItem('cart', JSON.stringify(tempCart));
    updateCartCountDisplay();
    
    // فتح نافذة الدفع
    showCheckoutPopup();
}

// ======================
// أزرار الصفحة
// ======================
document.getElementById('addToCartBtn').addEventListener('click', () => {
    addToCart(productData);
});

document.getElementById('buyNowBtn').addEventListener('click', () => {
    buyNow();
});

// ======================
// أيقونة السلة العائمة
// ======================
function ensureCartIcon() {
    if (!document.getElementById('cartIcon')) {
        const cartIcon = document.createElement('div');
        cartIcon.id = 'cartIcon';
        cartIcon.innerHTML = '🛒 <span id="cartCount">0</span>';
        cartIcon.style.cssText = `
            position: fixed; bottom: 20px; right: 20px; background: red;
            color: white; width: 55px; height: 55px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-size: 24px; z-index: 999;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); border: 2px solid white;
            transition: 0.3s;
        `;
        cartIcon.onclick = () => {
            window.location.href = 'index.html#openCart';
        };
        document.body.appendChild(cartIcon);
        updateCartCountDisplay();
    }
}

// ======================
// إضافة الحركات والتنسيقات
// ======================
const style = document.createElement('style');
style.textContent = `
    @keyframes fadeOut {
        0% { opacity: 1; transform: translateX(-50%) translateY(0); }
        70% { opacity: 1; }
        100% { opacity: 0; transform: translateX(-50%) translateY(-20px); visibility: hidden; }
    }
    
    .thumb-img {
        transition: 0.3s;
        opacity: 0.6;
    }
    
    .thumb-img.active-thumb {
        border: 2px solid red;
        opacity: 1;
        transform: scale(1.02);
    }
    
    /* صندوق الوصف بإطار واضح */
    .description-box {
        background: #1a1a1a;
        border: 2px solid #333;
        border-radius: 16px;
        padding: 18px;
        margin: 10px 0;
    }
    
    .description-box h3 {
        color: red;
        margin-bottom: 12px;
        font-size: 1.1rem;
        border-right: 3px solid red;
        padding-right: 10px;
    }
    
    .description-box p {
        line-height: 1.8;
        color: #ddd;
        font-size: 0.95rem;
    }
    
    /* الأزرار بشكل عمودي */
    .action-buttons-vertical {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 15px;
    }
    
    .add-to-cart-btn-product {
        background: #ff4757;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: 0.3s;
        width: 100%;
    }
    
    .add-to-cart-btn-product:hover {
        background: #e84118;
        transform: scale(1.01);
    }
    
    .buy-now-btn-product {
        background: red;
        color: white;
        border: none;
        padding: 12px 20px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 1rem;
        font-weight: bold;
        transition: 0.3s;
        width: 100%;
    }
    
    .buy-now-btn-product:hover {
        background: #c40000;
        transform: scale(1.01);
    }
`;
document.head.appendChild(style);

// تهيئة أيقونة السلة
ensureCartIcon();
</script>

</body>
</html>
